name: Build and Deploy Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/ruslan-devops14/devops-lab:latest .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/ruslan-devops14/devops-lab:latest

  deploy:
    needs: docker
    runs-on: self-hosted

    steps:
      - name: Deploy application
        run: |
          cd /home/ruslan/devops-lab/website
          docker compose pull
          docker compose up -d
          docker image prune -f
